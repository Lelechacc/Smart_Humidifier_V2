<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Humidifier V10 | 旗舰级物联网终端</title>
    <style>
        :root {
            /* 苹果风格的高级配色 */
            --glass-bg: rgba(255, 255, 255, 0.3);
            --glass-heavy: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
            --accent: #007aff;
            --text-dark: #1d1d1f;
            --shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: block;
            margin: 0;
            padding: 60px 20px;
            /* 修复背景：使用 macOS Sonoma 风格的流体渐变 */
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* 流星 Canvas 层 */
        #backgroundCanvas { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; 
        }

        .main-container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* 顶部 Header */
        .header-section { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 3.5rem; font-weight: 800; color: #fff; text-shadow: 0 10px 20px rgba(0,0,0,0.1); letter-spacing: -1.5px; }
        .subtitle { color: rgba(255,255,255,0.9); font-weight: 500; font-size: 1.2rem; margin-top: 10px; }
        .version-badge { background: #fff; color: var(--accent); padding: 6px 20px; border-radius: 50px; font-size: 0.9rem; font-weight: 700; display: inline-block; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        /* 通用玻璃卡片 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: var(--shadow);
            padding: 40px;
            margin-bottom: 40px;
        }

        .section-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 30px; display: flex; align-items: center; gap: 12px; }
        .section-title::before { content: ""; width: 6px; height: 1.8rem; background: var(--accent); border-radius: 3px; }

        /* 视频演示区 */
        .video-wrapper { 
            width: 100%; max-width: 800px; margin: 0 auto;
            background: #000; border-radius: 25px; overflow: hidden; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.25);
        }
        video { width: 100%; display: block; }

        /* 网格布局 */
        .grid-tech { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .tech-item { 
            background: rgba(255,255,255,0.4); 
            padding: 25px; border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.5);
            transition: 0.3s;
        }
        .tech-item:hover { transform: translateY(-5px); background: rgba(255,255,255,0.5); }
        .tech-item h3 { margin-bottom: 12px; font-size: 1.2rem; color: #007aff; }
        .tech-item p { font-size: 0.95rem; line-height: 1.6; color: #333; }

        /* 硬件图集区 */
        .grid-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .img-card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .img-container { width: 100%; height: 200px; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; cursor: zoom-in; }
        .img-container img:hover { transform: scale(1.1); }
        .img-info { padding: 15px; font-size: 0.85rem; text-align: center; font-weight: 500; }

        /* 音乐播放器组件 (iMac 浮动风格) */
        .music-player {
            position: fixed; bottom: 30px; right: 30px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(15px);
            padding: 12px 20px; border-radius: 50px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
            z-index: 9999;
        }
        .music-info { font-size: 13px; font-weight: 600; }
        .play-btn { 
            background: var(--accent); color: #fff; border: none; 
            padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 12px;
        }

        /* 按钮 */
        .btn-group { text-align: center; margin-top: 20px; }
        .btn { 
            display: inline-block; padding: 14px 28px; background: var(--accent); color: #fff; 
            text-decoration: none; border-radius: 50px; font-weight: 600; margin: 10px;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,122,255,0.3); }

        footer { text-align: center; padding: 40px; color: #fff; font-weight: 500; opacity: 0.8; }
    </style>
</head>
<body>

    <canvas id="backgroundCanvas"></canvas>

    <div class="music-player">
        <div class="music-info">🎵 Smart V10 Audio Feedback</div>
        <audio id="bgMusic" loop>
            <source src="music/ambient.mp3" type="audio/mpeg">
        </audio>
        <button class="play-btn" onclick="toggleMusic()" id="musicBtn">PLAY</button>
    </div>

    <div class="main-container">
        <header class="header-section">
            <h1>Smart Humidifier V10</h1>
            <div class="subtitle">基于 ESP32-C3 + FreeRTOS 的异步协作物联网终端</div>
            <span class="version-badge
