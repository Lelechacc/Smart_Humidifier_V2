<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Humidifier V10 | 随行式声控香氛助眠终端</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-heavy: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.35);
            --accent: #007aff;
            --text-dark: #1d1d1f;
            --shadow: 0 10px 40px rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* 彻底抛弃玄学的 flex，改回最稳定的基础块级布局 */
            display: block;
            margin: 0;
            padding: 60px 20px;
            
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), 
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=2500&q=80');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            color: var(--text-dark);
        }

        /* 👑 宇宙级绝对居中核心容器：不管屏幕多大，它死死定在正中间！ */
        .main-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto; /* 靠左右 margin 自动平分来实现绝对居中 */
            position: relative;
            z-index: 10;
        }

        /* 动态流星 Canvas 图层 */
        #backgroundCanvas { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 1; /* 保证在海浪之上，玻璃框之下 */
            pointer-events: none; 
        }

        .header-section { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 3.2rem; font-weight: 800; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.2); letter-spacing: -1px; }
        .subtitle { color: rgba(255,255,255,0.95); font-size: 1.1rem; font-weight: 500; margin-top: 10px; }
        .version-badge { background: var(--accent); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.95rem; font-weight: 600; display: inline-block; margin-top: 15px; box-shadow: 0 4px 12px rgba(0,122,255,0.3); }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            box-shadow: var(--shadow);
            padding: 40px;
            margin-bottom: 40px;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .glass-card:hover { transform: translateY(-5px); }

        .section-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .section-title::before { content: ""; width: 6px; height: 1.8rem; background: var(--accent); border-radius: 3px; }

        .video-wrapper { 
            width: 100%; max-width: 750px; margin: 0 auto;
            background: #000; border-radius: 25px; overflow: hidden; 
            line-height: 0; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        video { width: 100%; height: auto; }

        .grid-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .grid-tech { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 30px; }

        .img-card { background: rgba(255, 255, 255, 0.3); border-radius: 25px; overflow: hidden; border: 1px solid var(--glass-border); text-align: center; }
        .img-container { width: 100%; height: 260px; overflow: hidden; background: rgba(255,255,255,0.1); }
        .img-container img { 
            width: 100%; height: 100%; object-fit: cover; 
            display: block; cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .img-card:hover .img-container img { transform: scale(1.08); }
        .img-info { padding: 20px; font-weight: 600; font-size: 0.95rem; color: rgba(0,0,0,0.7); font-style: italic; }

        .tech-item { background: rgba(255,255,255,0.25); padding: 25px; border-radius: 22px; border: 1px solid var(--glass-border); }
        .tech-item h3 { margin-bottom: 12px; font-size: 1.15rem; color: #0056b3; }
        .tech-item p { font-size: 0.95rem; line-height: 1.6; color: #333; }
        .advantage-badge { background: #fff; color: var(--accent); padding: 2px 6px; border-radius: 5px; font-weight: 600; font-size: 0.8rem; margin-right: 5px; }

        footer { text-align: center; color: rgba(255,255,255,0.8); margin-top: 20px; }
        .btn { display: inline-block; padding: 14px 35px; background: #fff; color: var(--accent); text-decoration: none; border-radius: 30px; font-weight: 700; font-size: 1rem; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: 10px; }
        .btn:hover { background: var(--accent); color: #fff; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,122,255,0.2); }

        .lightbox-overlay {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); 
            z-index: 10000; 
            justify-content: center; align-items: center;
